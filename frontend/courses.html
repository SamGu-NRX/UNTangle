<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnTangle — Courses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f4f6f4; color: #1a2e1a; font-family: 'DM Sans', sans-serif; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 57px;
      background: #fff; border-bottom: 1px solid #dde8dd;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: #00512b; }
    .logo span { color: #6b826b; font-weight: 400; }
    .steps { display: flex; gap: 6px; }
    .step { width: 72px; height: 4px; border-radius: 2px; background: #dde8dd; transition: background 0.3s; }
    .step.done { background: #007a40; }
    .step.active { background: #00a855; }

    .courses-page { max-width: 760px; margin: 0 auto; padding: 32px 24px 100px; }

    .courses-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .courses-header h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; margin-bottom: 3px; }
    .section-sub { font-size: 13px; color: #6b826b; }
    .header-counts { display: flex; gap: 8px; flex-wrap: wrap; }
    .count-chip { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 99px; border: 1px solid; }
    .done-chip { background: #f0fdf4; border-color: #86efac; color: #15803d; }
    .prog-chip { background: #fffbeb; border-color: #fde68a; color: #d97706; }
    .none-chip { background: #f8fafc; border-color: #e2e8f0; color: #64748b; }

    /* Search + filter row */
    .filter-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .search-bar {
      flex: 1; background: #fff; border: 1px solid #dde8dd;
      border-radius: 8px; padding: 10px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: #1a2e1a;
      outline: none; transition: border-color 0.18s;
    }
    .search-bar:focus { border-color: #00512b; box-shadow: 0 0 0 3px rgba(0,81,43,0.1); }
    .search-bar::placeholder { color: #a3b8a3; }
    .dept-select {
      background: #fff; border: 1px solid #dde8dd; border-radius: 8px;
      padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: #1a2e1a; outline: none; cursor: pointer;
    }

    .dept-label {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px;
      color: #6b826b; text-transform: uppercase; letter-spacing: 0.1em;
      margin-top: 22px; margin-bottom: 8px;
    }
    .course-chip {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: #fff; border: 1px solid #dde8dd; border-radius: 10px;
      padding: 11px 14px; margin-bottom: 7px; transition: border-color 0.2s, background 0.2s;
    }
    .course-chip[data-status="none"]     { border-color: #e2e8f0; }
    .course-chip[data-status="progress"] { border-color: #fde68a; }
    .course-chip[data-status="done"]     { border-color: #86efac; background: #fafffe; }

    .chip-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .status-badge {
      flex-shrink: 0; font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; padding: 3px 8px; border-radius: 6px; border: 1px solid;
      min-width: 52px; text-align: center; transition: all 0.15s;
    }
    .badge-none     { background: #f8fafc; border-color: #e2e8f0; color: #64748b; }
    .badge-progress { background: #fffbeb; border-color: #fde68a; color: #d97706; }
    .badge-done     { background: #f0fdf4; border-color: #86efac; color: #15803d; }
    .chip-info { min-width: 0; }
    .course-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .course-code { font-size: 11px; color: #6b826b; margin-top: 2px; }

    .status-btns { display: flex; gap: 5px; flex-shrink: 0; }
    .status-btn {
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600;
      padding: 5px 10px; border-radius: 6px; border: 1px solid #dde8dd;
      background: transparent; color: #6b826b; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .status-btn:hover { border-color: #6b826b; color: #1a2e1a; }
    .active-none     { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
    .active-progress { background: #fffbeb; border-color: #fde68a; color: #d97706; }
    .active-done     { background: #f0fdf4; border-color: #86efac; color: #15803d; }

    .loading-state {
      text-align: center; padding: 60px 20px; color: #6b826b; font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid #dde8dd;
      border-top-color: #00512b; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .page-footer {
      position: fixed; bottom: 0; left: 0; right: 0; height: 57px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; background: #fff; border-top: 1px solid #dde8dd; z-index: 100;
    }
    .selected-count { font-size: 13px; color: #6b826b; }
    .selected-count strong { color: #00512b; }
    .btn {
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.18s;
    }
    .btn-primary { background: #00512b; color: #fff; }
    .btn-primary:hover { background: #007a40; }
    .btn-ghost { background: transparent; color: #6b826b; border: 1px solid #dde8dd; }
    .btn-ghost:hover { border-color: #00512b; color: #00512b; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">UnTangle <span>/ Courses</span></div>
    <div class="steps">
      <div class="step done"></div>
      <div class="step active"></div>
      <div class="step"></div>
      <div class="step"></div>
    </div>
  </nav>

  <div class="courses-page">
    <div class="courses-header">
      <div>
        <h2>Select Your Courses</h2>
        <p class="section-sub">Search and mark courses you've taken, are taking, or want to take.</p>
      </div>
      <div class="header-counts">
        <span class="count-chip done-chip"><span id="done-count">0</span> Done</span>
        <span class="count-chip prog-chip"><span id="progress-count">0</span> In Progress</span>
        <span class="count-chip none-chip"><span id="none-count">0</span> Want</span>
      </div>
    </div>

    <div class="filter-row">
      <input class="search-bar" id="search" placeholder="Search courses, e.g. CSCE 3600 or Calculus..." oninput="filterCourses()">
      <select class="dept-select" id="dept-filter" onchange="filterCourses()">
        <option value="">All Departments</option>
      </select>
    </div>

    <div id="course-list">
      <div class="loading-state">
        <div class="spinner"></div>
        Loading courses from database...
      </div>
    </div>
  </div>

  <div class="page-footer">
    <span class="selected-count">
      <strong id="done-count-footer">0</strong> done &nbsp;·&nbsp;
      <strong id="progress-count-footer">0</strong> in progress
    </span>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="window.location.href='DraftLogin.html'">&#8592; Back</button>
      <button class="btn btn-primary" onclick="goToSchedule()">Optimize Schedule &#8594;</button>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3001/api';
    let allSections = [];
    let courseStatuses = {}; // { "CSCE3600": "none"|"progress"|"done" }

    // Load saved statuses from sessionStorage
    const saved = sessionStorage.getItem('course_statuses');
    if (saved) courseStatuses = JSON.parse(saved);

    async function init() {
      try {
        // Load all subjects for the dropdown
        const subRes = await fetch(API + '/courses/subjects');
        const subjects = await subRes.json();
        const sel = document.getElementById('dept-filter');
        subjects.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s;
          opt.textContent = s;
          sel.appendChild(opt);
        });

        // Load all sections
        const res = await fetch(API + '/courses');
        allSections = await res.json();

        renderCourses(allSections);
      } catch (e) {
        document.getElementById('course-list').innerHTML =
          '<div class="loading-state" style="color:#dc2626;">⚠️ Cannot connect to backend.<br>Make sure <code>npm run dev</code> is running.</div>';
      }
    }

    // Group sections by unique course
    function groupByCourse(sections) {
      const map = {};
      sections.forEach(s => {
        const key = s.subject + s.number;
        if (!map[key]) {
          map[key] = { subject: s.subject, number: s.number, title: s.title, credits: s.credits, sections: [] };
        }
        map[key].sections.push(s);
      });
      return Object.values(map);
    }

    function renderCourses(sections) {
      const courses = groupByCourse(sections);
      const list = document.getElementById('course-list');
      list.innerHTML = '';

      if (courses.length === 0) {
        list.innerHTML = '<div class="loading-state">No courses found.</div>';
        return;
      }

      // Group by subject
      const bySubject = {};
      courses.forEach(c => {
        if (!bySubject[c.subject]) bySubject[c.subject] = [];
        bySubject[c.subject].push(c);
      });

      Object.keys(bySubject).sort().forEach(subj => {
        const label = document.createElement('div');
        label.className = 'dept-label';
        label.textContent = subj;
        list.appendChild(label);

        bySubject[subj].sort((a,b) => a.number.localeCompare(b.number)).forEach(course => {
          const key = course.subject + course.number;
          const status = courseStatuses[key] || 'none';
          list.appendChild(makeCourseChip(course, status));
        });
      });

      updateCounts();
    }

    function makeCourseChip(course, status) {
      const key = course.subject + course.number;
      const chip = document.createElement('div');
      chip.className = 'course-chip';
      chip.dataset.status = status;
      chip.dataset.key = key;

      const badgeClass = { none: 'badge-none', progress: 'badge-progress', done: 'badge-done' }[status];
      const badgeText  = { none: 'None', progress: 'Taking', done: 'Done' }[status];

      chip.innerHTML = `
        <div class="chip-left">
          <span class="status-badge ${badgeClass}">${badgeText}</span>
          <div class="chip-info">
            <div class="course-name">${course.title}</div>
            <div class="course-code">${course.subject} ${course.number} · ${course.credits} cr · ${course.sections.length} section${course.sections.length !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="status-btns">
          <button class="status-btn ${status==='none'?'active-none':''}"     onclick="setStatus(this,'none')">None</button>
          <button class="status-btn ${status==='progress'?'active-progress':''}" onclick="setStatus(this,'progress')">Taking</button>
          <button class="status-btn ${status==='done'?'active-done':''}"     onclick="setStatus(this,'done')">Done</button>
        </div>
      `;
      return chip;
    }

    function setStatus(btn, newStatus) {
      const chip = btn.closest('.course-chip');
      const key  = chip.dataset.key;
      chip.dataset.status = newStatus;

      chip.querySelectorAll('.status-btn').forEach(b => {
        b.classList.remove('active-none', 'active-progress', 'active-done');
      });
      btn.classList.add('active-' + newStatus);

      const badge = chip.querySelector('.status-badge');
      badge.className = 'status-badge';
      const map = { none: ['badge-none','None'], progress: ['badge-progress','Taking'], done: ['badge-done','Done'] };
      badge.classList.add(map[newStatus][0]);
      badge.textContent = map[newStatus][1];

      courseStatuses[key] = newStatus;
      sessionStorage.setItem('course_statuses', JSON.stringify(courseStatuses));
      updateCounts();
    }

    function updateCounts() {
      const chips = document.querySelectorAll('.course-chip');
      let done = 0, progress = 0, none = 0;
      chips.forEach(c => {
        if (c.dataset.status === 'done')     done++;
        if (c.dataset.status === 'progress') progress++;
        if (c.dataset.status === 'none')     none++;
      });
      document.getElementById('done-count').textContent     = done;
      document.getElementById('progress-count').textContent = progress;
      document.getElementById('none-count').textContent     = none;
      document.getElementById('done-count-footer').textContent     = done;
      document.getElementById('progress-count-footer').textContent = progress;
    }

    function filterCourses() {
      const q     = document.getElementById('search').value.trim();
      const dept  = document.getElementById('dept-filter').value;

      let filtered = allSections;
      if (dept) filtered = filtered.filter(s => s.subject === dept);

      // Filter by search query — re-fetch or filter in memory
      const courses = groupByCourse(filtered);
      const query = q.toLowerCase();

      const matched = query
        ? courses.filter(c =>
            c.title.toLowerCase().includes(query) ||
            (c.subject + c.number).toLowerCase().includes(query) ||
            c.subject.toLowerCase().includes(query)
          )
        : courses;

      renderFromCourses(matched);
    }

    function renderFromCourses(courses) {
      const list = document.getElementById('course-list');
      list.innerHTML = '';

      if (courses.length === 0) {
        list.innerHTML = '<div class="loading-state">No courses match your search.</div>';
        return;
      }

      const bySubject = {};
      courses.forEach(c => {
        if (!bySubject[c.subject]) bySubject[c.subject] = [];
        bySubject[c.subject].push(c);
      });

      Object.keys(bySubject).sort().forEach(subj => {
        const label = document.createElement('div');
        label.className = 'dept-label';
        label.textContent = subj;
        list.appendChild(label);

        bySubject[subj].sort((a,b) => a.number.localeCompare(b.number)).forEach(course => {
          const key = course.subject + course.number;
          const status = courseStatuses[key] || 'none';
          list.appendChild(makeCourseChip(course, status));
        });
      });

      updateCounts();
    }

    function goToSchedule() {
      // Save selected courses (progress + done) to sessionStorage for schedule page
      const selected = Object.entries(courseStatuses)
        .filter(([,v]) => v === 'progress' || v === 'done')
        .map(([k]) => k);
      sessionStorage.setItem('selected_courses', JSON.stringify(selected));
      window.location.href = 'schedule.html';
    }

    init();
  </script>
</body>
</html>
