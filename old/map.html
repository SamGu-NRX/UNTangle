<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnTangle — Campus Map</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #f4f6f4; color: #1a2e1a; }

    .map-shell {
      display: grid;
      grid-template-columns: 256px 1fr;
      height: calc(100vh - 57px - 57px);
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .map-sidebar {
      background: #ffffff;
      border-right: 1px solid #dde8dd;
      padding: 22px 16px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 0;
    }
    .sb-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: #6b826b; margin-bottom: 8px; margin-top: 4px;
    }
    .sb-divider { height: 1px; background: #dde8dd; margin: 16px 0; }

    /* Day tabs */
    .day-tabs { display: flex; gap: 4px; background: #f4f6f4; border-radius: 8px; padding: 3px; margin-bottom: 16px; }
    .day-tab {
      flex: 1; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      padding: 6px 4px; border: none; border-radius: 6px; cursor: pointer;
      background: transparent; color: #6b826b; transition: all 0.15s;
    }
    .day-tab.active { background: #ffffff; color: #00512b; box-shadow: 0 1px 4px rgba(0,60,20,0.1); }
    .day-tab:hover:not(.active) { color: #1a2e1a; }

    /* Stop list */
    .stop-item {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 10px 11px; border-radius: 8px;
      border: 1px solid #dde8dd; background: #ffffff;
      margin-bottom: 5px; border-left: 3px solid;
    }
    .stop-num {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px;
      border: 2px solid; flex-shrink: 0;
    }
    .stop-course { font-size: 12px; font-weight: 700; margin-bottom: 1px; font-family: 'DM Sans', sans-serif; }
    .stop-detail { font-size: 11px; color: #6b826b; font-family: 'DM Sans', sans-serif; }

    .walk-row {
      display: flex; align-items: center; gap: 7px;
      padding: 3px 11px 3px 20px;
      font-size: 11px; color: #6b826b; font-family: 'DM Sans', sans-serif;
    }
    .walk-arrow { color: #00a855; font-size: 14px; }
    .walk-tag {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px;
      background: #f0fdf4; border: 1px solid #86efac; color: #00512b;
    }

    .no-class {
      text-align: center; padding: 28px 12px;
      background: #f4f6f4; border-radius: 8px;
      border: 1px dashed #dde8dd; color: #6b826b;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
    }

    /* Stats */
    .stats-row { display: flex; border: 1px solid #dde8dd; border-radius: 8px; overflow: hidden; background: #ffffff; }
    .stat-box { flex: 1; padding: 10px 6px; text-align: center; border-right: 1px solid #dde8dd; }
    .stat-box:last-child { border-right: none; }
    .stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: #00512b; }
    .stat-lbl { font-size: 9px; color: #6b826b; margin-top: 1px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* Toggles */
    .tog-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 2px; font-size: 12px; color: #1a2e1a;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .tog-row input { accent-color: #00512b; width: 14px; height: 14px; cursor: pointer; }

    /* Download buttons */
    .dl-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 9px 14px; border-radius: 8px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      transition: all 0.15s; margin-bottom: 5px;
      border: 1px solid #dde8dd; background: #ffffff; color: #1a2e1a;
    }
    .dl-btn:hover { border-color: #00512b; color: #00512b; background: #f0fdf4; }
    .dl-btn.primary { background: #00512b; color: #ffffff; border-color: #00512b; }
    .dl-btn.primary:hover { background: #007a40; }

    /* Map canvas */
    .map-canvas { position: relative; overflow: hidden; background: #f4f6f4; flex: 1; }
    #campus-svg { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* Tooltip */
    .map-tooltip {
      position: absolute; background: #ffffff;
      border: 1px solid #dde8dd; border-radius: 8px;
      padding: 8px 12px; font-size: 12px; color: #1a2e1a;
      pointer-events: none; display: none; z-index: 10;
      box-shadow: 0 4px 14px rgba(0,60,20,0.1);
      font-family: 'DM Sans', sans-serif;
    }
    .tip-title { font-weight: 700; color: #00512b; margin-bottom: 2px; }
    .tip-sub   { color: #6b826b; }

    /* SVG animations */
    @keyframes drawLine { to { stroke-dashoffset: 0; } }
    @keyframes popDot   { from{opacity:0;transform:scale(0.2)} to{opacity:1;transform:scale(1)} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }

    /* Footer */
    .page-footer {
      position: fixed; bottom: 0; left: 0; right: 0; height: 57px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; background: #ffffff;
      border-top: 1px solid #dde8dd; z-index: 150;
    }

    .toast {
      position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
      background: #1a2e1a; color: #fff; border-radius: 99px;
      padding: 10px 20px; font-size: 13px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12); z-index: 9999;
      white-space: nowrap; pointer-events: none;
      animation: tIn 0.2s ease, tOut 0.3s ease 1.9s forwards;
    }
    @keyframes tIn  { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }
    @keyframes tOut { from{opacity:1} to{opacity:0} }
  </style>
</head>
<body>

  <!-- NAV — identical to courses.html -->
  <nav class="nav-light">
    <div class="logo-light">Un<span class="logo-accent">Tangle</span></div>
    <div class="steps">
      <div class="step done"></div>
      <div class="step done"></div>
      <div class="step done"></div>
      <div class="step active"></div>
    </div>
    <div class="nav-right-label">Step 4 of 4</div>
  </nav>

  <div class="map-shell">

    <!-- SIDEBAR -->
    <aside class="map-sidebar">
      <div class="sb-label">Select Day</div>
      <div class="day-tabs">
        <button class="day-tab active" data-day="0" onclick="pickDay(this)">Mon</button>
        <button class="day-tab"        data-day="1" onclick="pickDay(this)">Tue</button>
        <button class="day-tab"        data-day="2" onclick="pickDay(this)">Wed</button>
        <button class="day-tab"        data-day="3" onclick="pickDay(this)">Thu</button>
        <button class="day-tab"        data-day="4" onclick="pickDay(this)">Fri</button>
      </div>

      <div class="sb-label">Route — <span id="day-label">Monday</span></div>
      <div id="stop-list"></div>

      <div class="sb-divider"></div>
      <div class="sb-label">Summary</div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-val" id="stat-stops">—</div><div class="stat-lbl">Stops</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-dist">—</div><div class="stat-lbl">Walk</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-mins">—</div><div class="stat-lbl">Min</div></div>
      </div>

      <div class="sb-divider"></div>
      <div class="sb-label">Display</div>
      <label class="tog-row"><input type="checkbox" id="tog-labels" checked onchange="drawMap()"> Building labels</label>
      <label class="tog-row"><input type="checkbox" id="tog-walk"   checked onchange="drawMap()"> Walk times</label>
      <label class="tog-row"><input type="checkbox" id="tog-all"          onchange="drawMap()"> All buildings</label>
      <label class="tog-row"><input type="checkbox" id="tog-grid"         onchange="drawMap()"> Grid lines</label>

      <div class="sb-divider"></div>
      <button class="dl-btn primary" onclick="downloadSVG()">&#8681; Download Map</button>
      <button class="dl-btn" onclick="window.print()">&#9113; Print</button>
    </aside>

    <!-- MAP -->
    <div class="map-canvas" id="map-wrap">
      <svg id="campus-svg" viewBox="0 0 900 620" preserveAspectRatio="xMidYMid meet"
           xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="map-tooltip" id="tooltip"></div>
    </div>

  </div>

  <!-- FOOTER — identical pattern to courses.html -->
  <div class="page-footer">
    <button class="btn btn-ghost" onclick="window.location.href='schedule.html'">&#8592; Back</button>
    <span style="font-size:13px;color:#6b826b;font-family:'DM Sans',sans-serif;">🎓 &nbsp;You're all set for Fall 2026!</span>
  </div>

  <script>
    /* ── CAMPUS DATA ─────────────────────────────────────── */
    var buildings = [
      { id:'gab',   name:'General Academic', abbr:'GAB',   x:305, y:108, w:128, h:62,  fill:'#e8f5ee', stroke:'#a3c9b3' },
      { id:'wh',    name:'Wooten Hall',       abbr:'WH',    x:128, y:236, w:108, h:56,  fill:'#e8f0fb', stroke:'#a3b8e8' },
      { id:'sage',  name:'Sage Hall',         abbr:'Sage',  x:496, y:252, w:98,  h:56,  fill:'#fdf4e8', stroke:'#e8c98a' },
      { id:'sci',   name:'Science Research',  abbr:'SCI',   x:476, y:386, w:128, h:62,  fill:'#f5e8fb', stroke:'#c9a3e8' },
      { id:'lib',   name:'Willis Library',    abbr:'Lib',   x:128, y:380, w:98,  h:54,  fill:'#e8f5ee', stroke:'#a3c9b3' },
      { id:'syc',   name:'Sycamore Library',  abbr:'Syc',   x:284, y:356, w:106, h:54,  fill:'#e8f5ee', stroke:'#a3c9b3' },
      { id:'chem',  name:'Chemistry Bldg',    abbr:'Chem',  x:486, y:116, w:98,  h:50,  fill:'#e8f5ee', stroke:'#a3c9b3' },
      { id:'curry', name:'Curry Hall',        abbr:'Curry', x:646, y:126, w:88,  h:50,  fill:'#fef9e8', stroke:'#e8d98a' },
      { id:'music', name:'Music Annex',       abbr:'Music', x:136, y:494, w:94,  h:48,  fill:'#fce8e8', stroke:'#e8a3a3' },
      { id:'union', name:'UNT Union',         abbr:'Union', x:628, y:326, w:106, h:56,  fill:'#e8f5ee', stroke:'#a3c9b3' },
    ];

    var courseLoc = {
      'CSCE 1030': { bldg:'gab',  label:'General Academic' },
      'MATH 1710': { bldg:'wh',   label:'Wooten Hall' },
      'GOVT 2305': { bldg:'sage', label:'Sage Hall' },
      'PHYS 2220': { bldg:'sci',  label:'Science Research' },
    };

    var courseColors = {
      'CSCE 1030': { bg:'#f0fdf4', fg:'#166534', border:'#86efac', solid:'#16a34a' },
      'MATH 1710': { bg:'#eff6ff', fg:'#1e40af', border:'#93c5fd', solid:'#2563eb' },
      'GOVT 2305': { bg:'#fefce8', fg:'#713f12', border:'#fde047', solid:'#ca8a04' },
      'PHYS 2220': { bg:'#faf5ff', fg:'#581c87', border:'#d8b4fe', solid:'#7c3aed' },
    };

    var sections = {
      'CSCE 1030':[{days:[0,2,4],hour:8},{days:[0,2,4],hour:10},{days:[1,3],hour:11},{days:[0,2,4],hour:14},{days:[1,3],hour:17},{days:[1,3],hour:9}],
      'MATH 1710':[{days:[1,3],hour:8},{days:[1,3],hour:10},{days:[0,2,4],hour:9},{days:[1,3],hour:14},{days:[1,3],hour:18},{days:[0,2,4],hour:11}],
      'GOVT 2305':[{days:[0,2,4],hour:9},{days:[0,2,4],hour:11},{days:[1,3],hour:13},{days:[0,2,4],hour:15},{days:[1,3],hour:18},{days:[0,2,4],hour:8}],
      'PHYS 2220':[{days:[0,2,4],hour:8},{days:[1,3],hour:9},{days:[0,2,4],hour:11},{days:[0,2,4],hour:14},{days:[1,3],hour:16},{days:[0,2,4],hour:10}],
    };
    var chosen     = { 'CSCE 1030':0, 'MATH 1710':1, 'GOVT 2305':1, 'PHYS 2220':0 };
    var activeDay  = 0;
    var dayNames   = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

    function hfmt(h){ return h<12?h+':00 AM':h===12?'12:00 PM':(h-12)+':00 PM'; }

    function getBldg(id){ return buildings.find(function(b){ return b.id===id; }); }
    function center(b)  { return { x:b.x+b.w/2, y:b.y+b.h/2 }; }
    function dst(a,b)   { var dx=a.x-b.x,dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }
    function toMi(px)   { return (px/900*1.1).toFixed(2); }
    function toMin(px)  { return Math.max(1,Math.round(px/900*22)); }

    function getStops(day) {
      var s=[];
      Object.keys(chosen).forEach(function(c){
        var sec=sections[c][chosen[c]];
        if(sec.days.indexOf(day)!==-1) s.push({course:c,hour:sec.hour});
      });
      return s.sort(function(a,b){ return a.hour-b.hour; });
    }

    /* ── SVG helpers ─────────────────────────────────────── */
    var NS = 'http://www.w3.org/2000/svg';
    function el(tag,attrs){
      var e=document.createElementNS(NS,tag);
      Object.keys(attrs).forEach(function(k){ e.setAttribute(k,attrs[k]); });
      return e;
    }
    function tx(tag,attrs,text){ var e=el(tag,attrs); e.textContent=text; return e; }
    function anim(elem,css){ elem.style.cssText+=css; return elem; }

    /* ── DRAW MAP ─────────────────────────────────────────── */
    function drawMap() {
      var svg    = document.getElementById('campus-svg');
      svg.innerHTML = '';

      var stops      = getStops(activeDay);
      var showLabels = document.getElementById('tog-labels').checked;
      var showWalk   = document.getElementById('tog-walk').checked;
      var showAll    = document.getElementById('tog-all').checked;
      var showGrid   = document.getElementById('tog-grid').checked;
      var activeIds  = stops.map(function(s){ return courseLoc[s.course].bldg; });

      /* White background */
      svg.appendChild(el('rect',{width:900,height:620,fill:'#f4f6f4'}));

      /* Grid */
      if (showGrid) {
        for (var gx=0;gx<900;gx+=60)
          svg.appendChild(el('line',{x1:gx,y1:0,x2:gx,y2:620,stroke:'#dde8dd','stroke-width':'1'}));
        for (var gy=0;gy<620;gy+=60)
          svg.appendChild(el('line',{x1:0,y1:gy,x2:900,y2:gy,stroke:'#dde8dd','stroke-width':'1'}));
      }

      /* Roads */
      [[0,184,900,184],[0,318,900,318],[0,458,900,458],
       [254,0,254,620],[454,0,454,620],[638,0,638,620]].forEach(function(r){
        svg.appendChild(el('line',{x1:r[0],y1:r[1],x2:r[2],y2:r[3],stroke:'#d8e8d8','stroke-width':'16','stroke-linecap':'square'}));
        svg.appendChild(el('line',{x1:r[0],y1:r[1],x2:r[2],y2:r[3],stroke:'#b8d0b8','stroke-width':'1.5','stroke-dasharray':'10,10'}));
      });

      /* Road labels */
      svg.appendChild(tx('text',{x:18,y:181,fill:'#a3bca3','font-family':'DM Sans,Arial','font-size':'10'},'W Hickory St'));
      svg.appendChild(tx('text',{x:18,y:315,fill:'#a3bca3','font-family':'DM Sans,Arial','font-size':'10'},'W Mulberry St'));

      /* Buildings */
      buildings.forEach(function(b){
        var isActive = activeIds.indexOf(b.id) !== -1;
        if (!showAll && !isActive) return;

        var grp = document.createElementNS(NS,'g');
        grp.setAttribute('opacity', isActive ? 1 : 0.4);
        grp.style.cursor = 'pointer';

        grp.appendChild(el('rect',{x:b.x,y:b.y,width:b.w,height:b.h,rx:'7',
          fill: isActive ? b.fill : '#f0f4f0',
          stroke: isActive ? b.stroke : '#dde8dd',
          'stroke-width': isActive ? '1.5' : '1'}));

        if (showLabels) {
          grp.appendChild(tx('text',{x:b.x+b.w/2,y:b.y+b.h/2+(isActive?-4:4),
            'text-anchor':'middle','font-family':'Syne,Arial','font-size':'11','font-weight':'700',
            fill: isActive ? '#1a2e1a' : '#7a917a'},b.abbr));
          if (isActive) {
            grp.appendChild(tx('text',{x:b.x+b.w/2,y:b.y+b.h/2+9,
              'text-anchor':'middle','font-family':'DM Sans,Arial','font-size':'9','font-weight':'500',
              fill:'#4a5e4a'},b.name));
          }
        }

        grp.addEventListener('mouseenter',function(e){
          var tip = document.getElementById('tooltip');
          tip.innerHTML = '<div class="tip-title">'+b.name+'</div>';
          if (isActive) {
            var course = Object.keys(courseLoc).find(function(c){ return courseLoc[c].bldg===b.id; });
            if (course) tip.innerHTML += '<div class="tip-sub">'+course+'</div>';
          }
          tip.style.display = 'block';
        });
        grp.addEventListener('mousemove',function(e){
          var r = document.getElementById('map-wrap').getBoundingClientRect();
          var tip = document.getElementById('tooltip');
          tip.style.left=(e.clientX-r.left+14)+'px';
          tip.style.top =(e.clientY-r.top-10)+'px';
        });
        grp.addEventListener('mouseleave',function(){
          document.getElementById('tooltip').style.display='none';
        });
        svg.appendChild(grp);
      });

      /* Route lines */
      if (stops.length > 1) {
        for (var i=0; i<stops.length-1; i++) {
          var from = center(getBldg(courseLoc[stops[i].course].bldg));
          var to   = center(getBldg(courseLoc[stops[i+1].course].bldg));
          var d    = dst(from, to);
          var dl   = (i*0.55)+'s';
          var pl   = Math.round(d)+60;

          /* Glow */
          svg.appendChild(el('line',{x1:from.x,y1:from.y,x2:to.x,y2:to.y,
            stroke:'rgba(0,168,85,0.12)','stroke-width':'12','stroke-linecap':'round'}));

          /* Animated line */
          var line = el('line',{x1:from.x,y1:from.y,x2:to.x,y2:to.y,
            stroke:'#00a855','stroke-width':'2.5','stroke-linecap':'round',
            'stroke-dasharray':pl,'stroke-dashoffset':pl});
          line.style.animation = 'drawLine 1.2s ease forwards '+dl;
          svg.appendChild(line);

          /* Arrow */
          var mx=(from.x+to.x)/2, my=(from.y+to.y)/2;
          var ang=Math.atan2(to.y-from.y,to.x-from.x)*180/Math.PI;
          var ag = document.createElementNS(NS,'g');
          ag.setAttribute('transform','rotate('+ang+' '+mx+' '+my+')');
          var at = tx('text',{x:mx,y:my+5,'text-anchor':'middle','font-size':'12',fill:'#00a855'},'▶');
          at.style.animation='fadeIn 0.3s ease forwards '+(parseFloat(dl)+0.8)+'s';
          at.style.opacity='0';
          ag.appendChild(at); svg.appendChild(ag);

          /* Walk chip */
          if (showWalk) {
            var cw=80, ch=18, cx=mx-cw/2, cy=my+18;
            var bg=el('rect',{x:cx,y:cy,width:cw,height:ch,rx:'9',
              fill:'#ffffff',stroke:'#dde8dd','stroke-width':'1'});
            bg.style.animation='fadeIn 0.3s ease forwards '+(parseFloat(dl)+0.9)+'s';
            bg.style.opacity='0';
            svg.appendChild(bg);
            var wt=tx('text',{x:cx+cw/2,y:cy+12,'text-anchor':'middle',
              'font-family':'DM Sans,Arial','font-size':'9','font-weight':'600',fill:'#4a5e4a'},
              toMi(d)+' mi · '+toMin(d)+' min');
            wt.style.animation='fadeIn 0.3s ease forwards '+(parseFloat(dl)+0.9)+'s';
            wt.style.opacity='0';
            svg.appendChild(wt);
          }
        }
      }

      /* Stop dots */
      stops.forEach(function(stop,idx){
        var c   = center(getBldg(courseLoc[stop.course].bldg));
        var col = courseColors[stop.course];
        var dl  = (idx*0.38+0.25)+'s';

        /* White halo */
        var halo = el('circle',{cx:c.x,cy:c.y,r:'16',fill:'#ffffff',stroke:col.border,'stroke-width':'2'});
        halo.style.animation='popDot 0.35s cubic-bezier(.34,1.56,.64,1) forwards '+dl;
        halo.style.opacity='0'; svg.appendChild(halo);

        /* Colored dot */
        var dot = el('circle',{cx:c.x,cy:c.y,r:'12',fill:col.bg,stroke:col.solid,'stroke-width':'2'});
        dot.style.animation='popDot 0.35s cubic-bezier(.34,1.56,.64,1) forwards '+dl;
        dot.style.opacity='0'; svg.appendChild(dot);

        /* Number */
        var num = tx('text',{x:c.x,y:c.y+4,'text-anchor':'middle',
          'font-family':'Syne,Arial','font-size':'11','font-weight':'800',fill:col.fg},''+(idx+1));
        num.style.animation='fadeIn 0.2s ease forwards '+(parseFloat(dl)+0.15)+'s';
        num.style.opacity='0'; svg.appendChild(num);

        /* Label pill */
        var lx=c.x+18, ly=c.y-20;
        var lb=el('rect',{x:lx-4,y:ly-12,width:88,height:30,rx:'6',
          fill:col.bg,stroke:col.border,'stroke-width':'1.5'});
        lb.style.animation='fadeIn 0.25s ease forwards '+(parseFloat(dl)+0.2)+'s';
        lb.style.opacity='0'; svg.appendChild(lb);

        var lt=tx('text',{x:lx+40,y:ly-1,'text-anchor':'middle',
          'font-family':'Syne,Arial','font-size':'11','font-weight':'800',fill:col.fg},stop.course);
        lt.style.animation='fadeIn 0.25s ease forwards '+(parseFloat(dl)+0.22)+'s';
        lt.style.opacity='0'; svg.appendChild(lt);

        var ls=tx('text',{x:lx+40,y:ly+10,'text-anchor':'middle',
          'font-family':'DM Sans,Arial','font-size':'9',fill:col.fg,opacity:'0.8'},hfmt(stop.hour));
        ls.style.animation='fadeIn 0.25s ease forwards '+(parseFloat(dl)+0.22)+'s';
        ls.style.opacity='0'; svg.appendChild(ls);
      });

      renderSidebar(stops);
    }

    /* ── SIDEBAR STOPS ────────────────────────────────────── */
    function renderSidebar(stops) {
      var list = document.getElementById('stop-list');
      list.innerHTML = '';

      if (stops.length === 0) {
        list.innerHTML = '<div class="no-class">No classes on '+dayNames[activeDay]+'.<br>Enjoy the day off!</div>';
        document.getElementById('stat-stops').textContent = '0';
        document.getElementById('stat-dist').textContent  = '—';
        document.getElementById('stat-mins').textContent  = '—';
        return;
      }

      var totalPx = 0;
      stops.forEach(function(stop, idx) {
        var col = courseColors[stop.course];

        var item = document.createElement('div');
        item.className = 'stop-item';
        item.style.borderLeftColor = col.solid;
        item.innerHTML =
          '<div class="stop-num" style="background:'+col.bg+';color:'+col.fg+';border-color:'+col.solid+'">'+(idx+1)+'</div>' +
          '<div>' +
            '<div class="stop-course" style="color:'+col.solid+'">'+stop.course+'</div>' +
            '<div class="stop-detail">'+hfmt(stop.hour)+' · '+courseLoc[stop.course].label+'</div>' +
          '</div>';
        list.appendChild(item);

        if (idx < stops.length-1) {
          var fc = center(getBldg(courseLoc[stop.course].bldg));
          var tc = center(getBldg(courseLoc[stops[idx+1].course].bldg));
          var d  = dst(fc, tc);
          totalPx += d;

          var wr = document.createElement('div');
          wr.className = 'walk-row';
          wr.innerHTML =
            '<span class="walk-arrow">↓</span>' +
            '<span class="walk-tag">'+toMin(d)+' min</span>' +
            '<span>'+toMi(d)+' mi</span>';
          list.appendChild(wr);
        }
      });

      document.getElementById('stat-stops').textContent = stops.length;
      document.getElementById('stat-dist').textContent  = toMi(totalPx)+' mi';
      document.getElementById('stat-mins').textContent  = toMin(totalPx)+'m';
    }

    /* ── DAY SELECT ──────────────────────────────────────── */
    function pickDay(btn) {
      document.querySelectorAll('.day-tab').forEach(function(t){ t.classList.remove('active'); });
      btn.classList.add('active');
      activeDay = parseInt(btn.dataset.day);
      document.getElementById('day-label').textContent = dayNames[activeDay];
      drawMap();
    }

    /* ── DOWNLOAD ────────────────────────────────────────── */
    function downloadSVG() {
      var svg  = document.getElementById('campus-svg');
      var data = new XMLSerializer().serializeToString(svg);
      var blob = new Blob([data],{type:'image/svg+xml'});
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href=url; a.download='untangle-map.svg'; a.click();
      URL.revokeObjectURL(url);
      showToast('Map saved!');
    }

    function showToast(msg) {
      var ex=document.querySelector('.toast'); if(ex) ex.remove();
      var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
      document.body.appendChild(t);
      setTimeout(function(){ if(t.parentNode) t.remove(); },2400);
    }

    drawMap();
  </script>
</body>
</html>
